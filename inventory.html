<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานวิเคราะห์สินค้าคงคลัง - กุมภาพันธ์ | พัฒนาสิน ไทยเทรดดิ้ง</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ฟอนต์ภาษาไทย (Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        // --- ส่วนประกอบไอคอน (Icons) ---
        const IconBase = ({ children, size = 24, className = "", color = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const TrendingUp = (props) => <IconBase {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></IconBase>;
        const TrendingDown = (props) => <IconBase {...props}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></IconBase>;
        const Package = (props) => <IconBase {...props}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></IconBase>;
        const DollarSign = (props) => <IconBase {...props}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></IconBase>;
        const Building = (props) => <IconBase {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></IconBase>;
        const Tag = (props) => <IconBase {...props}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></IconBase>;

        // --- Main Component ---
        const Dashboard = () => {
            // ข้อมูลจากตาราง
            const data = {
                jan: { sales: 11910843.86, inventory: 13796185.96, ratio: 1.16 },
                feb: { sales: 9151800.50, inventory: 12438918.28, ratio: 1.36 },
                summary: { sales: 21062644.36, inventory: 26235104.24, ratio: 1.25 },
                target: 1.40
            };

            // ข้อมูล Dead Stock ที่ถูกทำลาย (จากภาพในระบบ)
            const writeOffData = {
                totalValue: 36950.26,
                totalQty: 375,
                items: [
                    { name: 'สีรองพื้นปูนเก่า M1 5gl (20 ลิตร)', qty: 20, unit: 'ถัง', value: 19587.52 },
                    { name: 'อีซีบอร์ด 4มิล 120x240cm', qty: 16, unit: 'แผ่น', value: 1679.68 },
                    { name: 'ไม้ระแนง (ลบเหลี่ยม) 3"x3เมตร', qty: 50, unit: 'แผ่น', value: 1673.50 },
                    { name: 'จระเข้ โพลี ยู-ซีล สีเทา', qty: 10, unit: 'หลอด', value: 1615.65 },
                    { name: 'ไม้ฝา เพชร 4m. หน้า 6" สีธรรมชาติ', qty: 30, unit: 'แผ่น', value: 1451.40 }
                ]
            };

            // ข้อมูล Dead Stock ที่ถูกนำมาจัดโปรโมชั่น
            const promoData = {
                totalValue: 347945.10, // ประเมินจากยอดรวมในตาราง
                totalItems: 23,
                items: [
                    { group: 'วัสดุก่อสร้าง', name: 'ประตูพีวีซี เรียบ ครีมไม่เจาะ 70*180', qty: 146, unit: 'ชุด', value: 75920 },
                    { group: 'อุปกรณ์การเกษตร', name: 'เทปน้ำหยด 0.16x20cmx1,000m', qty: 97, unit: 'ม้วน', value: 45590 },
                    { group: 'วัสดุก่อสร้าง', name: 'ประตูพีวีซี เรียบ เทา เจาะ 70*180', qty: 81, unit: 'ชุด', value: 42120 },
                    { group: 'อุปกรณ์การเกษตร', name: 'สายส่งน้ำ สีดำ PE Supper M 3"', qty: 2200, unit: 'เมตร', value: 34100 },
                    { group: 'เครื่องมือช่าง', name: 'แท่นตัดไฟเบอร์ 14" AMC355-2', qty: 3, unit: 'ตัว', value: 10680 }
                ]
            };

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
            };

            // คำนวณการเติบโต/ลดลง (Month over Month)
            const salesDiff = ((data.feb.sales - data.jan.sales) / data.jan.sales) * 100;
            const invDiff = ((data.feb.inventory - data.jan.inventory) / data.jan.inventory) * 100;
            const ratioDiff = data.feb.ratio - data.jan.ratio;

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    
                    {/* Header Section */}
                    <div className="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center justify-between">
                        <div className="flex items-center">
                            <div className="bg-blue-100 p-3 rounded-xl text-blue-700 mr-4">
                                <Building size={32} />
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold text-slate-900">บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด</h1>
                                <p className="text-slate-500 mt-1 text-lg">สรุปสินค้าคงคลังต่อยอดขาย ประจำเดือน <span className="font-bold text-blue-600">กุมภาพันธ์</span> (ปี 2026)</p>
                            </div>
                        </div>
                        <div className="mt-4 md:mt-0 flex items-center bg-slate-50 py-2 px-4 rounded-lg border border-slate-200">
                            <span className="text-sm font-medium text-slate-500 mr-3">เป้าหมาย KPI:</span>
                            <span className="text-xl font-bold text-slate-800">&lt; {data.target.toFixed(2)} เดือน</span>
                        </div>
                    </div>

                    {/* KPI Cards (Focus on February) */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        {/* KPI 1: Ratio */}
                        <div className={`p-6 rounded-2xl shadow-sm border-l-8 bg-white relative overflow-hidden ${data.feb.ratio < data.target ? 'border-green-500' : 'border-red-500'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider">สินค้าคงคลังต่อยอดขาย (ก.พ.)</p>
                                    <div className="flex items-end mt-2">
                                        <h2 className="text-4xl font-bold text-slate-900">{data.feb.ratio.toFixed(2)}</h2>
                                        <span className="text-lg text-slate-500 ml-2 mb-1">เดือน</span>
                                    </div>
                                </div>
                                <div className={`p-3 rounded-full ${data.feb.ratio < data.target ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                    {data.feb.ratio < data.target ? <CheckCircle size={28} /> : <AlertCircle size={28} />}
                                </div>
                            </div>
                            
                            <div className="mt-5 flex items-center text-sm">
                                {ratioDiff > 0 ? (
                                    <span className="flex items-center text-orange-500 font-medium bg-orange-50 px-2 py-1 rounded">
                                        <TrendingUp size={16} className="mr-1" />
                                        +{ratioDiff.toFixed(2)} จากเดือนก่อน
                                    </span>
                                ) : (
                                    <span className="flex items-center text-green-500 font-medium bg-green-50 px-2 py-1 rounded">
                                        <TrendingDown size={16} className="mr-1" />
                                        {ratioDiff.toFixed(2)} จากเดือนก่อน
                                    </span>
                                )}
                                <span className="ml-3 text-slate-400">| เป้า &lt; 1.40</span>
                            </div>
                        </div>

                        {/* KPI 2: Sales */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider">ยอดขาย (ก.พ.)</p>
                                    <h2 className="text-3xl font-bold text-slate-800 mt-2">{formatCurrency(data.feb.sales)}</h2>
                                </div>
                                <div className="p-3 bg-blue-50 text-blue-600 rounded-full">
                                    <DollarSign size={24} />
                                </div>
                            </div>
                            <div className="mt-5 flex items-center text-sm">
                                <span className={`flex items-center font-medium px-2 py-1 rounded ${salesDiff > 0 ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'}`}>
                                    {salesDiff > 0 ? <TrendingUp size={16} className="mr-1" /> : <TrendingDown size={16} className="mr-1" />}
                                    {Math.abs(salesDiff).toFixed(1)}% จาก ม.ค.
                                </span>
                            </div>
                        </div>

                        {/* KPI 3: Inventory */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-semibold text-slate-500 uppercase tracking-wider">สินค้าคงคลัง (ก.พ.)</p>
                                    <h2 className="text-3xl font-bold text-slate-800 mt-2">{formatCurrency(data.feb.inventory)}</h2>
                                </div>
                                <div className="p-3 bg-purple-50 text-purple-600 rounded-full">
                                    <Package size={24} />
                                </div>
                            </div>
                            <div className="mt-5 flex items-center text-sm">
                                <span className={`flex items-center font-medium px-2 py-1 rounded ${invDiff < 0 ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'}`}>
                                    {invDiff < 0 ? <TrendingDown size={16} className="mr-1" /> : <TrendingUp size={16} className="mr-1" />}
                                    {Math.abs(invDiff).toFixed(1)}% จาก ม.ค.
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* Data Table Section (Mirroring the image) */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-8">
                        <div className="bg-amber-100/50 p-4 border-b border-amber-200">
                            <h3 className="text-lg font-bold text-slate-800">ตารางสรุปสินค้าคงคลัง บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด ประจำปี 2026</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-base text-left">
                                <thead className="text-slate-700 bg-slate-50 border-b-2 border-slate-200">
                                    <tr>
                                        <th className="px-6 py-4 font-bold text-center w-20">ลำดับ</th>
                                        <th className="px-6 py-4 font-bold">รายการ</th>
                                        <th className="px-6 py-4 font-bold text-right w-48 bg-slate-100/50">Jan-24</th>
                                        <th className="px-6 py-4 font-bold text-right w-48 bg-slate-100/50">Feb-24</th>
                                        <th className="px-6 py-4 font-bold text-right w-48 bg-emerald-50 text-emerald-800">สรุป</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-200">
                                    {/* Row 1: Sales */}
                                    <tr className="hover:bg-slate-50 transition-colors">
                                        <td className="px-6 py-4 text-center">1</td>
                                        <td className="px-6 py-4 font-medium">ยอดขาย</td>
                                        <td className="px-6 py-4 text-right text-blue-700 font-medium">{formatCurrency(data.jan.sales)}</td>
                                        <td className="px-6 py-4 text-right text-blue-700 font-medium">{formatCurrency(data.feb.sales)}</td>
                                        <td className="px-6 py-4 text-right font-bold bg-emerald-50/50">{formatCurrency(data.summary.sales)}</td>
                                    </tr>
                                    {/* Row 2: Inventory */}
                                    <tr className="hover:bg-slate-50 transition-colors">
                                        <td className="px-6 py-4 text-center">2</td>
                                        <td className="px-6 py-4 font-medium">สินค้าคงคลัง (บาท)</td>
                                        <td className="px-6 py-4 text-right font-bold">{formatCurrency(data.jan.inventory)}</td>
                                        <td className="px-6 py-4 text-right font-bold">{formatCurrency(data.feb.inventory)}</td>
                                        <td className="px-6 py-4 text-right font-bold bg-emerald-50/50">{formatCurrency(data.summary.inventory)}</td>
                                    </tr>
                                    {/* Row 3: Ratio */}
                                    <tr className="hover:bg-slate-50 transition-colors border-t-2 border-slate-200">
                                        <td className="px-6 py-5 text-center font-bold">3</td>
                                        <td className="px-6 py-5 font-bold bg-yellow-300">สินค้าคงคลังต่อยอดขาย (เดือน) 1.40</td>
                                        <td className="px-6 py-5 text-right font-bold text-green-700 text-lg">{data.jan.ratio.toFixed(2)}</td>
                                        <td className="px-6 py-5 text-right font-bold text-green-700 text-lg">{data.feb.ratio.toFixed(2)}</td>
                                        <td className="px-6 py-5 text-right font-bold text-slate-800 text-lg bg-emerald-100">{data.summary.ratio.toFixed(2)}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Write-off Section (ทำลายสินค้า Dead Stock) */}
                    <div className="bg-red-50 rounded-2xl shadow-sm border border-red-100 overflow-hidden mb-8">
                        <div className="bg-red-100 p-4 border-b border-red-200 flex flex-col md:flex-row md:justify-between md:items-center">
                            <h3 className="text-lg font-bold text-red-800 flex items-center">
                                <Trash2 className="mr-2" />
                                รายงานการทำลายสินค้าเสื่อมสภาพ (Dead Stock Write-off)
                            </h3>
                            <div className="mt-2 md:mt-0 text-left md:text-right">
                                <span className="text-sm text-red-600 font-medium mr-2">มูลค่ารวมที่ทำลายออกจากระบบ:</span>
                                <span className="text-xl font-bold text-red-700">{formatCurrency(writeOffData.totalValue)} บาท</span>
                            </div>
                        </div>
                        <div className="p-6 flex flex-col md:flex-row gap-6">
                            <div className="md:w-1/3 bg-white p-6 rounded-xl border border-red-100 shadow-sm flex flex-col justify-center items-center text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-3">
                                    <Package size={32} />
                                </div>
                                <p className="text-slate-500 text-sm font-medium uppercase tracking-wider">จำนวนรวมที่ทำลาย</p>
                                <h4 className="text-4xl font-bold text-slate-800 mt-2">{writeOffData.totalQty} <span className="text-base font-normal text-slate-500">ชิ้น/รายการ</span></h4>
                                <p className="text-xs text-red-400 mt-3 bg-red-50 px-3 py-1 rounded-full border border-red-100">บันทึกตัดสต็อกเรียบร้อยแล้ว</p>
                            </div>
                            <div className="md:w-2/3">
                                <h4 className="font-semibold text-slate-700 mb-3 text-sm flex justify-between items-center">
                                    <span>ตัวอย่างรายการสินค้าที่ถูกทำลาย (มูลค่าสูงสุด 5 อันดับแรก)</span>
                                </h4>
                                <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-slate-50 text-slate-600 border-b border-slate-200 uppercase text-xs">
                                            <tr>
                                                <th className="px-4 py-3 font-semibold">ชื่อสินค้า</th>
                                                <th className="px-4 py-3 font-semibold text-right w-24">จำนวน</th>
                                                <th className="px-4 py-3 font-semibold text-right w-36">รวมมูลค่า (บาท)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 bg-white">
                                            {writeOffData.items.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-red-50 transition-colors">
                                                    <td className="px-4 py-3 text-slate-700 font-medium">{item.name}</td>
                                                    <td className="px-4 py-3 text-right text-slate-600">{item.qty} {item.unit}</td>
                                                    <td className="px-4 py-3 text-right font-bold text-red-600">{formatCurrency(item.value)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Promotion Section (จัดโปรโมชั่น Dead Stock) */}
                    <div className="bg-blue-50 rounded-2xl shadow-sm border border-blue-100 overflow-hidden mb-8">
                        <div className="bg-blue-100 p-4 border-b border-blue-200 flex flex-col md:flex-row md:justify-between md:items-center">
                            <h3 className="text-lg font-bold text-blue-800 flex items-center">
                                <Tag className="mr-2" />
                                แผนระบายสินค้าคงค้าง (Dead Stock Promotion)
                            </h3>
                            <div className="mt-2 md:mt-0 text-left md:text-right">
                                <span className="text-sm text-blue-600 font-medium mr-2">มูลค่าสินค้าที่นำมาจัดโปรโมชั่นรวมประมาณ:</span>
                                <span className="text-xl font-bold text-blue-700">{formatCurrency(promoData.totalValue)} บาท</span>
                            </div>
                        </div>
                        <div className="p-6 flex flex-col md:flex-row gap-6">
                            <div className="md:w-1/3 bg-white p-6 rounded-xl border border-blue-100 shadow-sm flex flex-col justify-center items-center text-center">
                                <div className="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mb-3">
                                    <Tag size={32} />
                                </div>
                                <p className="text-slate-500 text-sm font-medium uppercase tracking-wider">จำนวนรายการที่จัดโปร</p>
                                <h4 className="text-4xl font-bold text-slate-800 mt-2">{promoData.totalItems} <span className="text-base font-normal text-slate-500">รายการหลัก</span></h4>
                                <p className="text-xs text-blue-500 mt-3 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">อยู่ระหว่างดำเนินการขาย</p>
                            </div>
                            <div className="md:w-2/3">
                                <h4 className="font-semibold text-slate-700 mb-3 text-sm flex justify-between items-center">
                                    <span>ตัวอย่างรายการสินค้าที่เข้าร่วมโปรโมชั่น (มูลค่าสูงสุด 5 อันดับแรก)</span>
                                </h4>
                                <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-slate-50 text-slate-600 border-b border-slate-200 uppercase text-xs">
                                            <tr>
                                                <th className="px-4 py-3 font-semibold">กลุ่มสินค้า</th>
                                                <th className="px-4 py-3 font-semibold">ชื่อสินค้า</th>
                                                <th className="px-4 py-3 font-semibold text-right w-24">จำนวน</th>
                                                <th className="px-4 py-3 font-semibold text-right w-36">รวมมูลค่า (บาท)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 bg-white">
                                            {promoData.items.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-blue-50 transition-colors">
                                                    <td className="px-4 py-3 text-slate-500 text-xs">{item.group}</td>
                                                    <td className="px-4 py-3 text-slate-700 font-medium">{item.name}</td>
                                                    <td className="px-4 py-3 text-right text-slate-600">{item.qty} {item.unit}</td>
                                                    <td className="px-4 py-3 text-right font-bold text-blue-600">{formatCurrency(item.value)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Analysis Section */}
                    <div className="bg-slate-800 rounded-2xl p-6 text-white shadow-lg">
                        <h3 className="text-xl font-bold mb-4 flex items-center text-blue-300">
                            <TrendingUp className="mr-2" />
                            บทวิเคราะห์และข้อสังเกตประจำเดือนกุมภาพันธ์
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                <h4 className="font-semibold text-emerald-400 mb-2">จุดที่ทำได้ดี (Strengths & Actions)</h4>
                                <ul className="list-disc list-inside space-y-2 text-slate-200 text-sm">
                                    <li>ดัชนีสินค้าคงคลังต่อยอดขาย (1.36 เดือน) <strong>ยังคงอยู่ในเกณฑ์เป้าหมาย</strong> ที่กำหนดไว้คือน้อยกว่า 1.40 เดือน</li>
                                    <li>มูลค่าสินค้าคงคลังรวม <strong>ลดลง</strong> จาก 13.79 ล้านบาท เหลือ 12.43 ล้านบาท (ลดลงราว 9.8%) แสดงถึงการระบายสต๊อกที่ดี</li>
                                    <li className="text-emerald-300"><strong>การจัดการเชิงรุก (ตัดจำหน่าย):</strong> มีการอนุมัติทำลายสินค้าเสื่อมสภาพ มูลค่ารวม 36,950.26 บาท ช่วยล้างสต็อกที่ไม่มีคุณภาพและลดภาระการจัดเก็บ</li>
                                    <li className="text-emerald-300"><strong>การจัดการเชิงรุก (โปรโมชั่น):</strong> นำกลุ่มสินค้าค้างนาน (อุปการณ์เกษตร, วัสดุก่อสร้าง, ฯลฯ) มูลค่ารวมกว่า 3.47 แสนบาท มาจัดโปรโมชั่นเพื่อเร่งเปลี่ยนเป็นเงินสด</li>
                                </ul>
                            </div>
                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                <h4 className="font-semibold text-orange-400 mb-2">จุดที่ต้องเฝ้าระวัง (Watch-outs)</h4>
                                <ul className="list-disc list-inside space-y-2 text-slate-200 text-sm">
                                    <li><strong>ยอดขายลดลงอย่างมีนัยสำคัญ</strong> จาก 11.91 ล้านบาท ในเดือน ม.ค. เหลือ 9.15 ล้านบาท ในเดือน ก.พ. (ลดลงถึง 23.1%)</li>
                                    <li>อัตราส่วน KPI สูงขึ้น (แย่ลง) จาก 1.16 เป็น 1.36 เป็นผลมาจาก "ยอดขายที่ตกลง" เร็วกว่า "สต๊อกที่ลดลง"</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
