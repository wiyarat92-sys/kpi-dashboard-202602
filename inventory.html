<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานวิเคราะห์สินค้าคงคลัง - กุมภาพันธ์ | พัฒนาสิน ไทยเทรดดิ้ง</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ฟอนต์ภาษาไทย (Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #040814; /* Deep Dark Blue */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(30, 58, 138, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: #f1f5f9;
        }
        
        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        
        .glass-header {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(249, 115, 22, 0.05) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Glow Effects */
        .glow-text-orange { text-shadow: 0 0 15px rgba(249, 115, 22, 0.7); }
        .glow-text-green { text-shadow: 0 0 15px rgba(16, 185, 129, 0.7); }
        .glow-text-blue { text-shadow: 0 0 15px rgba(56, 189, 248, 0.7); }
        .glow-text-red { text-shadow: 0 0 15px rgba(239, 68, 68, 0.7); }

        .glow-border-orange { 
            box-shadow: inset 0 0 20px rgba(249, 115, 22, 0.1), 0 0 15px rgba(249, 115, 22, 0.2); 
            border-color: rgba(249, 115, 22, 0.5);
        }
        .glow-border-green {
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.1), 0 0 15px rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
        }

        /* Custom Scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.8); }
    </style>
</head>
<body class="text-slate-200">

    <div id="root"></div>

    <script type="text/babel">
        // --- ส่วนประกอบไอคอน (Icons) ---
        const IconBase = ({ children, size = 24, className = "", color = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const TrendingUp = (props) => <IconBase {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></IconBase>;
        const TrendingDown = (props) => <IconBase {...props}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></IconBase>;
        const Package = (props) => <IconBase {...props}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></IconBase>;
        const DollarSign = (props) => <IconBase {...props}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></IconBase>;
        const Building = (props) => <IconBase {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></IconBase>;
        const Tag = (props) => <IconBase {...props}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></IconBase>;

        // --- Main Component ---
        const Dashboard = () => {
            // ข้อมูลจากตาราง
            const data = {
                jan: { sales: 11910843.86, inventory: 13796185.96, ratio: 1.16 },
                feb: { sales: 9151800.50, inventory: 12438918.28, ratio: 1.36 },
                summary: { sales: 21062644.36, inventory: 26235104.24, ratio: 1.25 },
                target: 1.40
            };

            // ข้อมูล Dead Stock ที่ถูกทำลาย (จากภาพในระบบ)
            const writeOffData = {
                totalValue: 36950.26,
                totalQty: 375,
                items: [
                    { name: 'สีรองพื้นปูนเก่า M1 5gl (20 ลิตร)', qty: 20, unit: 'ถัง', value: 19587.52 },
                    { name: 'อีซีบอร์ด 4มิล 120x240cm', qty: 16, unit: 'แผ่น', value: 1679.68 },
                    { name: 'ไม้ระแนง (ลบเหลี่ยม) 3"x3เมตร', qty: 50, unit: 'แผ่น', value: 1673.50 },
                    { name: 'จระเข้ โพลี ยู-ซีล สีเทา', qty: 10, unit: 'หลอด', value: 1615.65 },
                    { name: 'ไม้ฝา เพชร 4m. หน้า 6" สีธรรมชาติ', qty: 30, unit: 'แผ่น', value: 1451.40 }
                ]
            };

            // ข้อมูล Dead Stock ที่ถูกนำมาจัดโปรโมชั่น
            const promoData = {
                totalValue: 347945.10, // ประเมินจากยอดรวมในตาราง
                totalItems: 23,
                items: [
                    { group: 'วัสดุก่อสร้าง', name: 'ประตูพีวีซี เรียบ ครีมไม่เจาะ 70*180', qty: 146, unit: 'ชุด', value: 75920 },
                    { group: 'อุปกรณ์การเกษตร', name: 'เทปน้ำหยด 0.16x20cmx1,000m', qty: 97, unit: 'ม้วน', value: 45590 },
                    { group: 'วัสดุก่อสร้าง', name: 'ประตูพีวีซี เรียบ เทา เจาะ 70*180', qty: 81, unit: 'ชุด', value: 42120 },
                    { group: 'อุปกรณ์การเกษตร', name: 'สายส่งน้ำ สีดำ PE Supper M 3"', qty: 2200, unit: 'เมตร', value: 34100 },
                    { group: 'เครื่องมือช่าง', name: 'แท่นตัดไฟเบอร์ 14" AMC355-2', qty: 3, unit: 'ตัว', value: 10680 }
                ]
            };

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
            };

            // คำนวณการเติบโต/ลดลง (Month over Month)
            const salesDiff = ((data.feb.sales - data.jan.sales) / data.jan.sales) * 100;
            const invDiff = ((data.feb.inventory - data.jan.inventory) / data.jan.inventory) * 100;
            const ratioDiff = data.feb.ratio - data.jan.ratio;

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto relative z-10">
                    
                    {/* Header Section */}
                    <div className="mb-8 glass-header p-6 rounded-2xl flex flex-col md:flex-row md:items-center justify-between">
                        <div className="flex items-center">
                            <div className="bg-orange-500/20 p-3 rounded-xl text-orange-400 mr-4 border border-orange-500/30 shadow-[0_0_15px_rgba(249,115,22,0.2)]">
                                <Building size={32} />
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold text-white tracking-wide">บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด</h1>
                                <p className="text-slate-400 mt-1 text-lg">สรุปสินค้าคงคลังต่อยอดขาย ประจำเดือน <span className="font-bold text-orange-400 glow-text-orange">กุมภาพันธ์</span> (ปี 2026)</p>
                            </div>
                        </div>
                        <div className="mt-4 md:mt-0 flex items-center bg-slate-900/60 py-2 px-5 rounded-xl border border-slate-700 shadow-inner">
                            <span className="text-sm font-medium text-slate-400 mr-3 uppercase tracking-wider">เป้าหมาย KPI:</span>
                            <span className="text-2xl font-bold text-orange-400 glow-text-orange">&lt; {data.target.toFixed(2)} เดือน</span>
                        </div>
                    </div>

                    {/* KPI Cards (Focus on February) */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        {/* KPI 1: Ratio */}
                        <div className={`glass-panel p-6 rounded-2xl border-l-4 relative overflow-hidden ${data.feb.ratio < data.target ? 'border-emerald-500 glow-border-green' : 'border-red-500'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-semibold text-slate-400 uppercase tracking-wider">สินค้าคงคลังต่อยอดขาย (ก.พ.)</p>
                                    <div className="flex items-end mt-2">
                                        <h2 className={`text-5xl font-bold text-white ${data.feb.ratio < data.target ? 'glow-text-green' : 'glow-text-red'}`}>{data.feb.ratio.toFixed(2)}</h2>
                                        <span className="text-lg text-slate-400 ml-2 mb-1 font-light">เดือน</span>
                                    </div>
                                </div>
                                <div className={`p-3 rounded-full border ${data.feb.ratio < data.target ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}>
                                    {data.feb.ratio < data.target ? <CheckCircle size={28} /> : <AlertCircle size={28} />}
                                </div>
                            </div>
                            
                            <div className="mt-5 flex items-center text-sm">
                                {ratioDiff > 0 ? (
                                    <span className="flex items-center text-orange-400 font-medium bg-orange-500/10 border border-orange-500/20 px-2 py-1 rounded">
                                        <TrendingUp size={16} className="mr-1" />
                                        +{ratioDiff.toFixed(2)} จากเดือนก่อน
                                    </span>
                                ) : (
                                    <span className="flex items-center text-emerald-400 font-medium bg-emerald-500/10 border border-emerald-500/20 px-2 py-1 rounded">
                                        <TrendingDown size={16} className="mr-1" />
                                        {ratioDiff.toFixed(2)} จากเดือนก่อน
                                    </span>
                                )}
                                <span className="ml-3 text-slate-500 text-xs uppercase tracking-wider">| เป้า &lt; 1.40</span>
                            </div>
                        </div>

                        {/* KPI 2: Sales */}
                        <div className="glass-panel p-6 rounded-2xl border-b-2 border-orange-500/50 hover:border-orange-500 transition-colors duration-300">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-semibold text-slate-400 uppercase tracking-wider">ยอดขาย (ก.พ.)</p>
                                    <h2 className="text-3xl font-bold text-white mt-2 glow-text-orange">{formatCurrency(data.feb.sales)}</h2>
                                </div>
                                <div className="p-3 bg-orange-500/10 text-orange-400 rounded-full border border-orange-500/20">
                                    <DollarSign size={24} />
                                </div>
                            </div>
                            <div className="mt-5 flex items-center text-sm">
                                <span className={`flex items-center font-medium px-2 py-1 rounded border ${salesDiff > 0 ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20' : 'text-red-400 bg-red-500/10 border-red-500/20'}`}>
                                    {salesDiff > 0 ? <TrendingUp size={16} className="mr-1" /> : <TrendingDown size={16} className="mr-1" />}
                                    {Math.abs(salesDiff).toFixed(1)}% จาก ม.ค.
                                </span>
                            </div>
                        </div>

                        {/* KPI 3: Inventory */}
                        <div className="glass-panel p-6 rounded-2xl border-b-2 border-blue-500/50 hover:border-blue-400 transition-colors duration-300">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm font-semibold text-slate-400 uppercase tracking-wider">สินค้าคงคลัง (ก.พ.)</p>
                                    <h2 className="text-3xl font-bold text-white mt-2 glow-text-blue">{formatCurrency(data.feb.inventory)}</h2>
                                </div>
                                <div className="p-3 bg-blue-500/10 text-blue-400 rounded-full border border-blue-500/20">
                                    <Package size={24} />
                                </div>
                            </div>
                            <div className="mt-5 flex items-center text-sm">
                                <span className={`flex items-center font-medium px-2 py-1 rounded border ${invDiff < 0 ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20' : 'text-red-400 bg-red-500/10 border-red-500/20'}`}>
                                    {invDiff < 0 ? <TrendingDown size={16} className="mr-1" /> : <TrendingUp size={16} className="mr-1" />}
                                    {Math.abs(invDiff).toFixed(1)}% จาก ม.ค.
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* Data Table Section */}
                    <div className="glass-panel rounded-2xl overflow-hidden mb-8">
                        <div className="bg-slate-900/60 p-5 border-b border-slate-700/50 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-slate-200">ตารางสรุปสินค้าคงคลัง <span className="text-orange-400 font-normal">| บริษัท พัฒนาสิน ไทยเทรดดิ้ง จำกัด ประจำปี 2026</span></h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-base text-left">
                                <thead className="text-slate-400 bg-slate-900/80 border-b-2 border-slate-700/80 text-sm uppercase tracking-wider">
                                    <tr>
                                        <th className="px-6 py-5 font-bold text-center w-20">ลำดับ</th>
                                        <th className="px-6 py-5 font-bold">รายการ</th>
                                        <th className="px-6 py-5 font-bold text-right w-48 bg-slate-800/30">Jan-24</th>
                                        <th className="px-6 py-5 font-bold text-right w-48 bg-slate-800/30">Feb-24</th>
                                        <th className="px-6 py-5 font-bold text-right w-48 text-orange-400 bg-orange-500/5">สรุป YTD</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800/50">
                                    {/* Row 1: Sales */}
                                    <tr className="hover:bg-slate-800/40 transition-colors">
                                        <td className="px-6 py-4 text-center text-slate-500 font-bold">1</td>
                                        <td className="px-6 py-4 font-medium text-slate-200">ยอดขาย</td>
                                        <td className="px-6 py-4 text-right text-blue-400 font-medium">{formatCurrency(data.jan.sales)}</td>
                                        <td className="px-6 py-4 text-right text-orange-400 font-medium">{formatCurrency(data.feb.sales)}</td>
                                        <td className="px-6 py-4 text-right font-bold text-white bg-orange-500/10 glow-text-orange border-l border-orange-500/10">{formatCurrency(data.summary.sales)}</td>
                                    </tr>
                                    {/* Row 2: Inventory */}
                                    <tr className="hover:bg-slate-800/40 transition-colors">
                                        <td className="px-6 py-4 text-center text-slate-500 font-bold">2</td>
                                        <td className="px-6 py-4 font-medium text-slate-200">สินค้าคงคลัง (บาท)</td>
                                        <td className="px-6 py-4 text-right text-slate-300 font-bold">{formatCurrency(data.jan.inventory)}</td>
                                        <td className="px-6 py-4 text-right text-slate-100 font-bold">{formatCurrency(data.feb.inventory)}</td>
                                        <td className="px-6 py-4 text-right font-bold text-white bg-orange-500/10 glow-text-orange border-l border-orange-500/10">{formatCurrency(data.summary.inventory)}</td>
                                    </tr>
                                    {/* Row 3: Ratio */}
                                    <tr className="hover:bg-slate-800/60 transition-colors bg-slate-800/20 border-t border-slate-700">
                                        <td className="px-6 py-5 text-center text-slate-500 font-bold">3</td>
                                        <td className="px-6 py-5 font-bold text-slate-200 flex items-center">
                                            สินค้าคงคลังต่อยอดขาย (เดือน) 
                                            <span className="ml-2 px-2 py-0.5 bg-orange-500/20 text-orange-400 rounded text-xs border border-orange-500/30">เป้า &lt; 1.40</span>
                                        </td>
                                        <td className="px-6 py-5 text-right font-bold text-emerald-400 text-lg">{data.jan.ratio.toFixed(2)}</td>
                                        <td className="px-6 py-5 text-right font-bold text-emerald-400 text-lg glow-text-green">{data.feb.ratio.toFixed(2)}</td>
                                        <td className="px-6 py-5 text-right font-bold text-white text-xl bg-orange-500/20 border-l border-orange-500/30 glow-text-orange">{data.summary.ratio.toFixed(2)}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        {/* Write-off Section (ทำลายสินค้า Dead Stock) */}
                        <div className="glass-panel rounded-2xl overflow-hidden border-t-4 border-t-red-500/80 shadow-[0_-5px_20px_rgba(239,68,68,0.1)]">
                            <div className="bg-red-900/20 p-5 border-b border-red-500/20 flex justify-between items-center">
                                <h3 className="text-base font-bold text-red-400 flex items-center">
                                    <Trash2 className="mr-2" /> Dead Stock Write-off
                                </h3>
                                <div className="text-right">
                                    <span className="text-xl font-bold text-white drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]">{formatCurrency(writeOffData.totalValue)}</span>
                                </div>
                            </div>
                            <div className="p-5 flex flex-col gap-4">
                                <div className="flex items-center justify-between bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                                    <div className="flex items-center">
                                        <div className="w-12 h-12 bg-red-500/10 text-red-400 rounded-full flex items-center justify-center mr-4 border border-red-500/20">
                                            <Package size={24} />
                                        </div>
                                        <div>
                                            <p className="text-slate-400 text-xs font-medium uppercase tracking-wider">จำนวนที่ทำลาย</p>
                                            <h4 className="text-2xl font-bold text-white">{writeOffData.totalQty} <span className="text-sm font-normal text-slate-500">ชิ้น</span></h4>
                                        </div>
                                    </div>
                                    <span className="text-xs text-red-300 bg-red-900/40 px-3 py-1 rounded-full border border-red-800/50">ตัดสต็อกแล้ว</span>
                                </div>
                                
                                <div className="overflow-x-auto rounded-xl border border-slate-700/50 bg-slate-900/30">
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-900/60 text-slate-400 border-b border-slate-700/50">
                                            <tr>
                                                <th className="px-4 py-3 font-semibold">ชื่อสินค้า (Top 5)</th>
                                                <th className="px-4 py-3 font-semibold text-right">มูลค่า (บาท)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {writeOffData.items.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-slate-800/40">
                                                    <td className="px-4 py-3 text-slate-300 truncate max-w-[150px]">{item.name}</td>
                                                    <td className="px-4 py-3 text-right font-medium text-red-300">{formatCurrency(item.value)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* Promotion Section (จัดโปรโมชั่น Dead Stock) */}
                        <div className="glass-panel rounded-2xl overflow-hidden border-t-4 border-t-orange-500/80 shadow-[0_-5px_20px_rgba(249,115,22,0.1)]">
                            <div className="bg-orange-900/20 p-5 border-b border-orange-500/20 flex justify-between items-center">
                                <h3 className="text-base font-bold text-orange-400 flex items-center">
                                    <Tag className="mr-2" /> Dead Stock Promotion
                                </h3>
                                <div className="text-right">
                                    <span className="text-xl font-bold text-white drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]">{formatCurrency(promoData.totalValue)}</span>
                                </div>
                            </div>
                            <div className="p-5 flex flex-col gap-4">
                                <div className="flex items-center justify-between bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                                    <div className="flex items-center">
                                        <div className="w-12 h-12 bg-orange-500/10 text-orange-400 rounded-full flex items-center justify-center mr-4 border border-orange-500/20">
                                            <Tag size={24} />
                                        </div>
                                        <div>
                                            <p className="text-slate-400 text-xs font-medium uppercase tracking-wider">รายการที่จัดโปร</p>
                                            <h4 className="text-2xl font-bold text-white">{promoData.totalItems} <span className="text-sm font-normal text-slate-500">รายการ</span></h4>
                                        </div>
                                    </div>
                                    <span className="text-xs text-orange-300 bg-orange-900/40 px-3 py-1 rounded-full border border-orange-800/50">กำลังขาย</span>
                                </div>
                                
                                <div className="overflow-x-auto rounded-xl border border-slate-700/50 bg-slate-900/30">
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-900/60 text-slate-400 border-b border-slate-700/50">
                                            <tr>
                                                <th className="px-4 py-3 font-semibold">ชื่อสินค้า (Top 5)</th>
                                                <th className="px-4 py-3 font-semibold text-right">มูลค่า (บาท)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {promoData.items.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-slate-800/40">
                                                    <td className="px-4 py-3 text-slate-300 truncate max-w-[150px]">{item.name}</td>
                                                    <td className="px-4 py-3 text-right font-medium text-orange-300">{formatCurrency(item.value)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Analysis Section */}
                    <div className="glass-panel border border-slate-700/50 rounded-2xl p-6 md:p-8 relative overflow-hidden">
                        {/* Glow ambient background inside analysis */}
                        <div className="absolute -top-24 -right-24 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>
                        
                        <h3 className="text-xl font-bold mb-6 flex items-center text-slate-100">
                            <TrendingUp className="mr-3 text-blue-400" />
                            บทวิเคราะห์และข้อสังเกตประจำเดือน <span className="text-orange-400 ml-2">กุมภาพันธ์</span>
                        </h3>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                            <div className="bg-slate-900/60 p-5 rounded-xl border border-emerald-500/20 hover:border-emerald-500/40 transition-colors">
                                <h4 className="font-semibold text-emerald-400 mb-3 flex items-center text-sm uppercase tracking-wide">
                                    <CheckCircle size={16} className="mr-2" /> จุดที่ทำได้ดี (Strengths & Actions)
                                </h4>
                                <ul className="space-y-3 text-slate-300 text-sm leading-relaxed">
                                    <li className="flex items-start"><span className="text-emerald-500 mr-2 mt-1">▪</span> ดัชนีสินค้าคงคลังต่อยอดขาย (1.36 เดือน) <strong>ยังคงอยู่ในเกณฑ์เป้าหมาย</strong> ที่กำหนดไว้คือน้อยกว่า 1.40 เดือน</li>
                                    <li className="flex items-start"><span className="text-emerald-500 mr-2 mt-1">▪</span> มูลค่าสินค้าคงคลังรวม <strong>ลดลง</strong> จาก 13.79 ล้านบาท เหลือ 12.43 ล้านบาท (ลดลงราว 9.8%)</li>
                                    <li className="flex items-start"><span className="text-emerald-500 mr-2 mt-1">▪</span> <strong>การจัดการเชิงรุก (ตัดจำหน่าย):</strong> ทำลายสินค้าเสื่อมสภาพ 36,950 บาท ช่วยล้างสต็อกที่ไม่มีคุณภาพ</li>
                                    <li className="flex items-start"><span className="text-emerald-500 mr-2 mt-1">▪</span> <strong>การจัดการเชิงรุก (โปรโมชั่น):</strong> นำกลุ่มสินค้าค้างนานมูลค่ารวมกว่า 3.47 แสนบาท จัดโปรโมชั่นเร่งเปลี่ยนเป็นเงินสด</li>
                                </ul>
                            </div>
                            
                            <div className="bg-slate-900/60 p-5 rounded-xl border border-orange-500/20 hover:border-orange-500/40 transition-colors">
                                <h4 className="font-semibold text-orange-400 mb-3 flex items-center text-sm uppercase tracking-wide">
                                    <AlertCircle size={16} className="mr-2" /> จุดที่ต้องเฝ้าระวัง (Watch-outs)
                                </h4>
                                <ul className="space-y-3 text-slate-300 text-sm leading-relaxed">
                                    <li className="flex items-start"><span className="text-orange-500 mr-2 mt-1">▪</span> <strong className="text-white">ยอดขายลดลงอย่างมีนัยสำคัญ</strong> จาก 11.91 ล้านบาท เหลือ 9.15 ล้านบาท (ลดลงถึง 23.1%)</li>
                                    <li className="flex items-start"><span className="text-orange-500 mr-2 mt-1">▪</span> อัตราส่วน KPI สูงขึ้น (แย่ลง) จาก 1.16 เป็น 1.36 เป็นผลมาจาก "ยอดขายที่ตกลง" เร็วกว่า "สต๊อกที่ลดลง"</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>

    หน้าถัดไป (Delivery Perf.) ➜
